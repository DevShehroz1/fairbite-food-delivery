<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Mobile-first: no zoom, fixed width -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#E53935" />
    <meta name="description" content="FairBite — Ethical food delivery. Order from local restaurants with fair 15% commission." />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA — adds to home screen like native app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FairBite" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Prevent cache of old app shell on iOS -->
    <meta http-equiv="Cache-Control" content="no-cache" />

    <!-- Social / OG -->
    <meta property="og:title" content="FairBite — Fair Food Delivery" />
    <meta property="og:description" content="Order food with just 15% commission — fair for restaurants, fair for riders." />
    <meta property="og:type" content="website" />

    <title>FairBite</title>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
      /* Prevent flash of white on load */
      body { background: #E53935; margin: 0; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run FairBite.</noscript>
    <div id="root"></div>
  </body>
</html>
