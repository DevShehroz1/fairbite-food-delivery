<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="qbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF7043"/>
      <stop offset="1" stop-color="#E53935"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square red background tile so the PWA / favicon still has a
       branded silhouette even though the wordmark identity itself is
       type-only. -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#qbBg)"/>
  <!-- "qb." in heavy Inter at the same negative-letter-spacing as the
       in-app wordmark. The dot is set in white for max contrast and to
       echo the brand-accent dot in the full "quickbite." wordmark. -->
  <text x="32" y="44"
        text-anchor="middle"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-weight="900"
        font-size="34"
        letter-spacing="-1.6"
        fill="#FFFFFF">qb<tspan fill="#FFE5DD">.</tspan></text>
</svg>
